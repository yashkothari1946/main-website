<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vybtek | Modern CRM Dashboard</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Security / Auth Check -->
  <script>
    // Immediately check if the user is logged in
    if (localStorage.getItem('vybtek_admin_logged_in') !== 'true') {
      // Not logged in, redirect to the admin login portal
      window.location.href = 'admin.html';
    }
  </script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'vt-navy': '#0D1B3E',
            'vt-blue': '#007CC3',
            'vt-cyan': '#00C8E6',
            'vt-dark': '#060B1A',
            'vt-gray': '#1E293B',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="assets/css/crm-style.css">
</head>
<body class="flex h-screen antialiased">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white flex flex-col border-r border-slate-200 shrink-0 relative z-20">
    <div class="p-6 flex items-center gap-3">
      <img src="images/logo.png" alt="Vybtek Logo" class="h-8 object-contain">
      <span class="font-black text-xl tracking-tight text-slate-900">CRM</span>
    </div>

    <div class="px-4 py-2 text-xs font-bold text-slate-500 uppercase tracking-widest mt-4">Modules</div>
    <nav class="flex-1 px-2 space-y-1 mt-2">
      <a href="crm.html" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 transition-colors font-medium nav-item" id="nav-dashboard">
        <i class="fas fa-chart-pie w-5 text-center"></i> Dashboard
      </a>
      <a href="crm-pipeline.html" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 transition-colors font-medium nav-item" id="nav-pipeline" class="w-full flex items-center gap-3 px-4 py-3 text-slate-900 font-medium nav-item active" style="background: #F1F5F9; border-left: 3px solid #007CC3;">
        <i class="fas fa-columns w-5 text-center"></i> Pipeline
      </a>
      <a href="crm-clients.html" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 transition-colors font-medium nav-item" id="nav-clients">
        <i class="fas fa-users w-5 text-center"></i> Clients & Onboarding
      </a>
      <a href="crm-quotations.html" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 transition-colors font-medium nav-item" id="nav-quotations">
        <i class="fas fa-file-invoice w-5 text-center"></i> Quotations
      </a>
      <a href="crm-billing.html" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 transition-colors font-medium nav-item" id="nav-billing">
        <i class="fas fa-credit-card w-5 text-center"></i> Billing & Invoices
      </a>
      <a href="crm-emails.html" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 transition-colors font-medium nav-item" id="nav-emails">
        <i class="fas fa-envelope w-5 text-center"></i> Emails & Follow-ups
      </a>
    </nav>

    <div class="p-4 border-t border-slate-200">
      <a href="admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 transition-colors font-medium">
        <i class="fas fa-arrow-left w-5 text-center"></i> Back to Admin
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
    
    <!-- TOPBAR -->
    <header class="h-20 bg-white/50 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 shrink-0 relative z-10">
      <div class="flex items-center gap-4 w-1/3">
        <div class="relative w-full">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
          <input type="text" placeholder="Search clients, invoices, or projects..." class="w-full bg-slate-100 border border-slate-200 rounded-full py-2.5 pl-11 pr-4 text-sm text-slate-900 focus:outline-none focus:border-vt-blue transition-colors">
        </div>
      </div>
      
      <div class="flex items-center gap-6">
        <button class="relative text-slate-600 hover:text-slate-900 transition-colors">
          <i class="fas fa-bell text-xl"></i>
          <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[9px] flex items-center justify-center font-bold text-slate-900 border-2 border-vt-navy">3</span>
        </button>
        <div class="flex items-center gap-3 pl-6 border-l border-slate-200 cursor-pointer">
          <img src="https://ui-avatars.com/api/?name=Admin&background=00C8E6&color=fff" class="w-10 h-10 rounded-full" alt="Admin">
          <div class="hidden md:block text-sm">
            <p class="font-bold text-slate-900">System Admin</p>
            <p class="text-xs text-slate-500">Vybtek HQ</p>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="flex-1 overflow-auto p-8 relative z-0">
      
      <!-- MODULE: DASHBOARD -->
      

      <!-- MODULE: PIPELINE (Kanban) -->
      <div id="module-pipeline" class="h-full flex flex-col">
        <div class="flex justify-between items-center mb-6 shrink-0">
          <div>
            <h1 class="text-3xl font-black text-slate-900 mb-1">Sales Pipeline</h1>
            <p class="text-slate-500">Drag and drop leads through the sales cycle.</p>
          </div>
          <button class="bg-vt-blue hover:bg-blue-600 text-slate-900 px-5 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-vt-blue/30 transition-all flex items-center gap-2">
            <i class="fas fa-plus"></i> New Lead
          </button>
        </div>

        <div class="flex-1 flex gap-6 overflow-x-auto pb-4" id="kanban-board">
          <!-- Kanban columns will be injected here via JS -->
        </div>
      </div>

      <!-- MODULE: CLIENTS -->
      

      <!-- MODULE: QUOTATIONS -->
      

      <!-- MODULE: BILLING -->
      

      <!-- MODULE: EMAILS -->
      

    </div>

    <!-- CREATE QUOTE MODAL -->
    <div id="modal-quote" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
        <div class="p-6 border-b border-slate-200 flex justify-between items-center">
          <h2 class="font-black text-slate-900 text-lg">Create Quotation</h2>
          <button onclick="toggleModal('modal-quote', false)" class="text-slate-500 hover:text-slate-900"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 space-y-4 flex-1 overflow-auto">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Select Client</label>
            <select id="quote-client" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm"></select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Quote Number</label>
              <input type="text" id="quote-number" placeholder="QT-2026-..." class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Valid Until</label>
              <input type="date" id="quote-date" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Total Amount ($)</label>
            <input type="number" id="quote-amount" placeholder="5000" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
          </div>
        </div>
        <div class="p-6 border-t border-slate-200 flex justify-end gap-3">
          <button onclick="toggleModal('modal-quote', false)" class="px-5 py-2.5 rounded-lg font-bold text-sm text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
          <button onclick="submitQuote()" class="bg-vt-cyan hover:bg-cyan-400 text-vt-navy px-5 py-2.5 rounded-lg font-bold text-sm shadow-lg transition-all">Generate Quote</button>
        </div>
      </div>
    </div>

    <!-- CREATE INVOICE MODAL -->
    <div id="modal-invoice" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
        <div class="p-6 border-b border-slate-200 flex justify-between items-center">
          <h2 class="font-black text-slate-900 text-lg">Create Invoice</h2>
          <button onclick="toggleModal('modal-invoice', false)" class="text-slate-500 hover:text-slate-900"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 space-y-4 flex-1 overflow-auto">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Select Client</label>
            <select id="invoice-client" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm"></select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Invoice Number</label>
              <input type="text" id="invoice-number" placeholder="INV-2026-..." class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Due Date</label>
              <input type="date" id="invoice-date" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Amount ($)</label>
            <input type="number" id="invoice-amount" placeholder="1500" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
          </div>
        </div>
        <div class="p-6 border-t border-slate-200 flex justify-end gap-3">
          <button onclick="toggleModal('modal-invoice', false)" class="px-5 py-2.5 rounded-lg font-bold text-sm text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
          <button onclick="submitInvoice()" class="bg-green-500 hover:bg-green-600 text-white px-5 py-2.5 rounded-lg font-bold text-sm shadow-lg transition-all">Send Invoice</button>
        </div>
      </div>
    </div>

    <!-- CREATE TASK MODAL -->
    <div id="modal-task" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
        <div class="p-6 border-b border-slate-200 flex justify-between items-center">
          <h2 class="font-black text-slate-900 text-lg">New Follow-up</h2>
          <button onclick="toggleModal('modal-task', false)" class="text-slate-500 hover:text-slate-900"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 space-y-4 flex-1 overflow-auto">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Select Client</label>
            <select id="task-client" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm"></select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Type</label>
              <select id="task-type" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
                <option value="call">Phone Call</option>
                <option value="email">Email</option>
                <option value="meeting">Meeting</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Due Date</label>
              <input type="datetime-local" id="task-date" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Subject / Title</label>
            <input type="text" id="task-title" placeholder="Discuss project timeline..." class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Notes</label>
            <textarea id="task-desc" rows="3" class="w-full bg-slate-100 border border-slate-200 rounded-lg p-2.5 text-sm"></textarea>
          </div>
        </div>
        <div class="p-6 border-t border-slate-200 flex justify-end gap-3">
          <button onclick="toggleModal('modal-task', false)" class="px-5 py-2.5 rounded-lg font-bold text-sm text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
          <button onclick="submitTask()" class="bg-vt-blue hover:bg-blue-600 text-white px-5 py-2.5 rounded-lg font-bold text-sm shadow-lg transition-all">Schedule Follow-up</button>
        </div>
      </div>
    </div>
    <!-- ONBOARDING SIDEBAR -->
    <div id="onboarding-sidebar" class="fixed inset-y-0 right-0 w-96 bg-white border-l border-slate-200 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
      <div class="p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50">
        <div>
          <h2 class="font-black text-slate-900 text-lg" id="onboarding-company-name">Client Name</h2>
          <p class="text-xs font-bold text-slate-500 uppercase">Onboarding Checklist</p>
        </div>
        <button onclick="closeOnboarding()" class="w-8 h-8 rounded-full hover:bg-slate-200 text-slate-500 flex items-center justify-center transition-colors">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <div class="p-6 border-b border-slate-200">
        <div class="flex justify-between items-end mb-2">
          <span class="text-sm font-bold text-slate-900">Progress</span>
          <span class="text-xs font-bold text-vt-blue" id="onboarding-progress-text">0%</span>
        </div>
        <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
          <div class="h-full bg-vt-blue transition-all duration-500" id="onboarding-progress-bar" style="width: 0%"></div>
        </div>
      </div>

      <div class="flex-1 overflow-auto p-6 space-y-3" id="onboarding-tasks-container">
        <!-- Tasks injected here -->
      </div>
    </div>

  </main>

  <script src="assets/js/crm-app.js"></script>
</body>
</html>
