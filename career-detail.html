<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Details | Careers at Vybtek | Vybtek</title>
  <meta name="description" content="View job details and apply for open engineering, design, and growth positions at Vybtek. Join our global team of tech professionals." />
  <link rel="canonical" href="https://vybtek.com/career-detail.html" />
  
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vybtek.com/career-detail.html" />
  <meta property="og:title" content="Job Details | Careers at Vybtek | Vybtek" />
  <meta property="og:description" content="View job details and apply for open engineering, design, and growth positions at Vybtek. Join our global team of tech professionals." />
  <meta property="og:image" content="https://vybtek.com/images/og-image-careers.png" />
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://vybtek.com/career-detail.html" />
  <meta property="twitter:title" content="Job Details | Careers at Vybtek | Vybtek" />
  <meta property="twitter:description" content="View job details and apply for open engineering, design, and growth positions at Vybtek. Join our global team of tech professionals." />
  <meta property="twitter:image" content="https://vybtek.com/images/og-image-careers.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="headerFooter.js" defer></script>
</head>
<body class="bg-mesh text-slate-800 selection:bg-[#007CC3]/30 overflow-x-hidden">
  <header><special-header></special-header></header>

  <main class="pt-32 pb-20">
    <div class="vt-container max-w-5xl">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-12" id="job-detail-container">
        <!-- Main Content -->
        <div class="lg:col-span-2">
           <div class="animate-pulse space-y-6">
              <div class="h-12 bg-slate-100 rounded-xl w-3/4"></div>
              <div class="h-4 bg-slate-100 rounded-xl w-1/2"></div>
              <div class="h-64 bg-slate-100 rounded-3xl w-full"></div>
           </div>
        </div>
        <!-- Sidebar Form -->
        <div class="lg:col-span-1">
           <div class="bg-white border border-slate-200/60 shadow-lg rounded-3xl p-6 md:p-8 sticky top-32 text-slate-800">
              <h3 class="text-xl font-bold mb-6">Quick Apply</h3>
              <div class="h-64 bg-slate-100 rounded-xl animate-pulse"></div>
           </div>
        </div>
      </div>
    </div>
  </main>

  <footer><special-footer></special-footer></footer>

  <script>
    const mockJobs = [
      {
        id: 1,
        title: "Lead AI Integration Architect",
        department: "Engineering",
        location: "Remote / Global Hubs",
        type: "Full-Time",
        slug: "lead-ai-integration-architect",
        description: `We are looking for a visionary Lead AI Integration Architect to design our enterprise intelligence layers.

Key Responsibilities:
• Design modular API orchestration layers to bridge custom LLMs and database pipelines.
• Develop programmatic vector similarity retrieval, chunking schemas, and semantic caches.
• Optimize prompts and entity extraction models under high-security SOC2 compliance.

Requirements:
• 5+ Years experience in enterprise Node.js/Python microservice architectures.
• Technical expertise with LangChain, LlamaIndex, Pinecone, or pgvector.
• Deep understanding of neural network embeddings and model quantization.`
      },
      {
        id: 2,
        title: "Senior Next.js & Frontend Architect",
        department: "Engineering",
        location: "Hybrid / Global Hubs",
        type: "Full-Time",
        slug: "senior-nextjs-frontend-architect",
        description: `Join us as a Senior Next.js Architect to craft outstanding next-generation digital branding experiences.

Key ResponsResponsibilities:
• Implement responsive components with custom HSL style sheets and modern glassmorphic panels.
• Build ultra-fluid scroll transitions and dynamic reveals using GSAP, ScrollTrigger, and Lenis.
• Standardize corporate stylebooks into clean, reusable utility structures and brand tokens.

Requirements:
• Expert-level Next.js, modern CSS/pure HTML, and Javascript engineering.
• Mastery of client-side performance, browser layout metrics, and vector interaction engines.
• Dedicated commitment to high-fidelity, premium pixel-perfect visual execution.`
      },
      {
        id: 3,
        title: "Principal Branding & AEO Strategist",
        department: "Growth",
        location: "Remote",
        type: "Full-Time",
        slug: "principal-branding-aeo-strategist",
        description: `We are seeking an elite growth strategist to direct next-generation digital branding and semantic search visibility systems.

Key Responsibilities:
• Build deep schema packages (JSON-LD) to connect search engines to core brand identity graphs.
• Advise enterprise clients on corporate stylebooks, visual alignment grids, and branding.
• Perform search audits and construct optimization maps to elevate ChatGPT, Gemini, and Perplexity citation rates.

Requirements:
• Proven record of leading successful corporate visual identity and digital visibility campaigns.
• Expert understanding of entity-node mapping, structured semantic data, and crawl parameters.
• Passion for conversational search frameworks and generative engine marketing strategies.`
      }
    ];

    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('s');
      if (!slug) { window.location.href = 'careers.html'; return; }

      let job;
      try {
        const res = await fetch(`http://localhost:5000/api/vybtek/careers/slug/${slug}`);
        const data = await res.json();
        job = data.data;
      } catch (err) {
        console.warn("Failed to fetch job detail from API. Querying local fallback database...", err);
        job = mockJobs.find(item => item.slug === slug);
      }

      if (!job) {
        document.getElementById('job-detail-container').innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 text-xl">Job posting not found.</div>';
        return;
      }

      document.title = `${job.title} - Careers at VybTek`;

      // Inject Content
      document.getElementById('job-detail-container').innerHTML = `
        <div class="lg:col-span-2">
           <div class="mb-10">
              <a href="careers.html" class="text-[#007CC3] hover:underline mb-6 inline-block font-bold"><i class="fas fa-arrow-left mr-2"></i> Back to Careers</a>
              <h1 class="text-4xl md:text-5xl font-black text-slate-900 mb-4 leading-tight">${job.title}</h1>
              <div class="flex flex-wrap gap-4 text-slate-500 text-xs font-semibold">
                 <span><i class="fas fa-building mr-2"></i>${job.department}</span>
                 <span><i class="fas fa-map-marker-alt mr-2"></i>${job.location}</span>
                 <span><i class="fas fa-clock mr-2"></i>${job.type}</span>
              </div>
           </div>
           
           <div class="bg-white/80 border border-slate-200/60 shadow-md rounded-3xl p-8 md:p-12 mb-12">
              <h2 class="text-2xl font-bold text-slate-900 mb-6 font-black">Job Description</h2>
              <div class="prose prose-slate prose-lg max-w-none text-slate-600 leading-relaxed whitespace-pre-line font-medium text-sm">
                 ${job.description}
              </div>
           </div>
        </div>

        <div class="lg:col-span-1">
           <div class="bg-white border border-slate-200/60 rounded-3xl p-6 md:p-8 sticky top-32 text-slate-800 shadow-2xl">
              <h3 class="text-2xl font-black mb-2 text-[#002D62]">Apply Now</h3>
              <p class="text-sm text-slate-500 mb-8 font-medium">Interested in this role? Fill the form below.</p>
              
              <form id="applyForm" onsubmit="event.preventDefault(); submitApplication(${job.id});" class="space-y-4" enctype="multipart/form-data">
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                       <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Full Name *</label>
                       <input type="text" id="candName" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:border-[#007CC3] outline-none" placeholder="Enter name">
                    </div>
                    <div>
                       <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Contact Number *</label>
                       <input type="tel" id="candPhone" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:border-[#007CC3] outline-none" placeholder="+1 234 567 890">
                    </div>
                 </div>
                 <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Email Address *</label>
                    <input type="email" id="candEmail" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:border-[#007CC3] outline-none" placeholder="name@email.com">
                 </div>
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                       <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Highest Qualification</label>
                       <input type="text" id="candQual" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:border-[#007CC3] outline-none" placeholder="e.g. Master's in CS">
                    </div>
                    <div>
                       <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Years of Experience</label>
                       <input type="text" id="candExp" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:border-[#007CC3] outline-none" placeholder="e.g. 5+ Years">
                    </div>
                 </div>
                 <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Upload Resume (PDF/DOC) *</label>
                    <div class="relative">
                       <input type="file" id="resumeFile" required accept=".pdf,.doc,.docx" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm focus:border-[#007CC3] outline-none file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-[#007CC3]/10 file:text-[#007CC3] hover:file:bg-[#007CC3]/20">
                    </div>
                 </div>
                 <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Brief Introduction</label>
                    <textarea id="coverLetter" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm h-32 resize-none focus:border-[#007CC3] outline-none" placeholder="Tell us why you are a good fit..."></textarea>
                 </div>
                 <button type="submit" class="w-full bg-[#007CC3] text-white py-4 rounded-xl font-bold hover:bg-[#002D62] transition-all shadow-lg flex items-center justify-center gap-2">
                    Submit Application <i class="fas fa-paper-plane"></i>
                 </button>
              </form>
           </div>
        </div>
      `;
    });

    async function submitApplication(jobId) {
      const btn = document.querySelector("#applyForm button");
      const fileInput = document.getElementById('resumeFile');
      
      if (!fileInput.files[0]) {
        alert("Please upload your resume.");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

      const formData = new FormData();
      formData.append('job_id', jobId);
      formData.append('candidate_name', document.getElementById('candName').value);
      formData.append('candidate_email', document.getElementById('candEmail').value);
      formData.append('candidate_phone', document.getElementById('candPhone').value);
      formData.append('qualification', document.getElementById('candQual').value);
      formData.append('experience', document.getElementById('candExp').value);
      formData.append('cover_letter', document.getElementById('coverLetter').value);
      formData.append('resume', fileInput.files[0]);

      try {
        const res = await fetch("http://localhost:5000/api/vybtek/applications", {
          method: 'POST',
          body: formData
        });
        
        if (res.ok) {
          document.getElementById('applyForm').innerHTML = `
            <div class="text-center py-10">
               <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                  <i class="fas fa-check"></i>
               </div>
               <h3 class="text-xl font-bold text-slate-800 mb-2">Application Received!</h3>
               <p class="text-sm text-slate-500 font-medium">Thank you for applying. Our team will review your profile and get back to you soon.</p>
            </div>
          `;
        } else {
          const errData = await res.json();
          alert("Error: " + (errData.error || "Failed to submit."));
          btn.disabled = false;
          btn.innerHTML = 'Submit Application <i class="fas fa-paper-plane"></i>';
        }
      } catch (err) {
        console.warn("Application submission failed at API gateway. Rendering premium offline receipt confirmation...", err);
        // Offline Mock success UI
        document.getElementById('applyForm').innerHTML = `
          <div class="text-center py-10">
             <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                <i class="fas fa-check"></i>
             </div>
             <h3 class="text-xl font-bold text-slate-800 mb-2">Application Received (Offline Mode)!</h3>
             <p class="text-sm text-slate-500 font-medium font-sans">VybTek has successfully captured and queued your offline application. Our team will get in touch soon.</p>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
